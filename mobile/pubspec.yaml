publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.1.0
  web_socket_channel: ^2.4.0
  flutter_local_notifications: ^16.3.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  intl: ^0.19.0
  permission_handler: ^11.1.0
  device_info_plus: ^9.1.2
  timezone: ^0.9.2
  uuid: ^4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
